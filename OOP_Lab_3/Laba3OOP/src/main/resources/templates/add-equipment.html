<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Добавление оборудования</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        body {
            padding: 20px;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, rgba(255,0,0,0.25), rgba(0,0,255,0.25), rgba(255,255,0,0.25), rgba(0,255,0,0.25));
            background-size: 400% 400%;
            animation: gradientAnimation 60s ease infinite;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            backdrop-filter: blur(10px);
            z-index: -1;
        }
        
        .form-container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(5px);
            border: 1px solid #e0e0e0;
        }
        
        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
            text-align: center;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .type-specific-fields {
            display: none;
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid #e0e0e0;
        }
        
        .camera-fields {
            border-color: #2ecc71;
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.3);
        }
        
        .light-fields {
            border-color: #f39c12;
            box-shadow: 0 0 15px rgba(243, 156, 18, 0.3);
        }
        
        .form-label {
            color: #2c3e50;
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #bdc3c7;
            color: #2c3e50;
            border-radius: 10px;
            padding: 12px 15px;
            transition: all 0.3s ease;
        }
        
        .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.95);
            border-color: #3498db;
            box-shadow: 0 0 0 0.25rem rgba(52, 152, 219, 0.25);
            color: #2c3e50;
        }
        
        .form-control::placeholder {
            color: #95a5a6;
        }
        
        input:invalid, select:invalid {
            border-color: #e74c3c;
            box-shadow: 0 0 0 0.25rem rgba(231, 76, 60, 0.25);
        }
        
        input:valid, select:valid {
            border-color: #2ecc71;
        }
        
        .error-message {
            color: #e74c3c;
            font-size: 0.875em;
            margin-top: 0.25rem;
        }
        
        .alert {
            border-radius: 10px;
            border: none;
            background: #ecf0f1;
            color: #3498db;
            border-left: 4px solid #3498db;
            margin-bottom: 25px;
        }
        
        .alert-info {
            background: #d6eaf8;
            color: #2980b9;
            border-left-color: #2980b9;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 25px rgba(52, 152, 219, 0.4);
        }
        
        .btn-secondary {
            background: #ecf0f1;
            border: 1px solid #bdc3c7;
            color: #2c3e50;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-secondary:hover {
            background: #d6eaf8;
            border-color: #3498db;
        }
        
        .d-flex.justify-content-between {
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container">
            <h1>Добавление оборудования</h1>
            
            <form th:action="@{/add}" method="post" th:object="${equipment}">
                <div class="alert alert-info">
                    <strong>Внимание!</strong> Выберите тип оборудования, чтобы появились соответствующие поля для заполнения.
                </div>
                
                <!-- Сообщение об ошибке -->
                <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
                
                <div class="mb-3">
                    <label for="equipmentType" class="form-label">Тип оборудования *</label>
                    <select class="form-select" id="equipmentType" name="equipmentType" required
                            onchange="showTypeSpecificFields(this.value)"
                            th:value="${equipmentType}">
                        <option value="">Выберите тип...</option>
                        <option th:each="type : ${equipmentTypes}" th:value="${type}" th:text="${type}" 
                                th:selected="${type == equipmentType}"></option>
                    </select>
                    <div class="error-message">Поле обязательно для заполнения</div>
                </div>
                
                <div class="mb-3">
                    <label for="name" class="form-label">Название</label>
                    <input type="text" class="form-control" id="name" name="name" required 
                           th:value="${name}">
                </div>
                
                <div class="mb-3">
                    <label for="serialNumber" class="form-label">Серийный номер</label>
                    <input type="text" class="form-control" id="serialNumber" name="serialNumber" required
                           th:value="${serialNumber}">
                </div>
                
                <div class="mb-3">
                    <label for="studioRoomId" class="form-label">Помещение</label>
                    <select class="form-select" id="studioRoomId" name="studioRoomId" required
                            th:value="${studioRoomId}">
                        <option value="">Выберите помещение...</option>
                        <option th:each="room : ${studioRooms}" 
                                th:value="${room.id}" th:text="${room.name}"
                                th:selected="${room.id == studioRoomId}"></option>
                    </select>
                </div>
                
                <!-- Поля для Camera -->
                <div id="cameraFields" class="type-specific-fields camera-fields">
                    <h5>Параметры камеры</h5>
                    <div class="mb-3">
                        <label for="resolution" class="form-label">Разрешение (MP) *</label>
                        <input type="number" class="form-control" id="resolution" name="resolution" min="1" max="100" required
                               th:value="${resolution}">
                        <div class="error-message">Обязательное поле</div>
                    </div>
                    <div class="mb-3">
                        <label for="charge" class="form-label">Заряд батареи (%) *</label>
                        <input type="number" class="form-control" id="charge" name="charge" min="0" max="100" required
                               th:value="${charge}">
                        <div class="error-message">Обязательное поле</div>
                    </div>
                </div>
                
                <!-- Поля для Light -->
                <div id="lightFields" class="type-specific-fields light-fields">
                    <h5>Параметры света</h5>
                    <div class="mb-3">
                        <label for="brightness" class="form-label">Яркость (%) *</label>
                        <input type="number" class="form-control" id="brightness" name="brightness" min="0" max="100" required
                               th:value="${brightness}">
                        <div class="error-message">Обязательное поле</div>
                    </div>
                    <div class="mb-3">
                        <label for="colorTemperature" class="form-label">Цветовая температура (K) *</label>
                        <input type="number" class="form-control" id="colorTemperature" name="colorTemperature" min="2000" max="10000" required
                               th:value="${colorTemperature}">
                        <div class="error-message">Обязательное поле</div>
                    </div>
                </div>
                
                <div class="d-flex justify-content-between mt-4">
                    <a href="/" class="btn btn-secondary">Отмена</a>
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        // Функция для отображения полей в зависимости от типа оборудования
        function showTypeSpecificFields(type) {
            document.getElementById('cameraFields').style.display = 'none';
            document.getElementById('lightFields').style.display = 'none';
            
            if (type === 'Camera') {
                document.getElementById('cameraFields').style.display = 'block';
            } else if (type === 'Light') {
                document.getElementById('lightFields').style.display = 'block';
            }
        }
        
        // Дополнительная проверка перед отправкой формы
        document.addEventListener('DOMContentLoaded', function() {
            // Показываем поля для выбранного типа оборудования при загрузке страницы
            const equipmentType = document.getElementById('equipmentType').value;
            if (equipmentType) {
                showTypeSpecificFields(equipmentType);
            }
            
            document.querySelector('form').addEventListener('submit', function(e) {
                const equipmentType = document.getElementById('equipmentType').value;
                
                if (equipmentType === 'Camera') {
                    const resolution = document.getElementById('resolution');
                    const charge = document.getElementById('charge');
                    
                    if (!resolution.value || !charge.value) {
                        e.preventDefault();
                        alert('Для камеры обязательны поля: разрешение и заряд батареи');
                        return false;
                    }
                } else if (equipmentType === 'Light') {
                    const brightness = document.getElementById('brightness');
                    const colorTemperature = document.getElementById('colorTemperature');
                    
                    if (!brightness.value || !colorTemperature.value) {
                        e.preventDefault();
                        alert('Для света обязательны поля: яркость и цветовая температура');
                        return false;
                    }
                } else if (equipmentType === '') {
                    e.preventDefault();
                    alert('Выберите тип оборудования');
                    return false;
                }
            });
        });
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
