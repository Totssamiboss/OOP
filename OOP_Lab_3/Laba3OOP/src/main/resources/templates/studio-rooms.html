<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Помещения фотостудии</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        body {
            padding: 20px;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, rgba(255,0,0,0.25), rgba(0,0,255,0.25), rgba(255,255,0,0.25), rgba(0,255,0,0.25));
            background-size: 400% 400%;
            animation: gradientAnimation 60s ease infinite;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            backdrop-filter: blur(10px);
            z-index: -1;
        }
        
        .container {
            max-width: 1200px;
        }
        
        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
            text-align: center;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .card {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #e0e0e0;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }
        
        .card-header {
            background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%);
            border-bottom: 1px solid #e0e0e0;
            border-radius: 15px 15px 0 0 !important;
            padding: 15px 20px;
        }
        
        .card-header h5 {
            color: white;
            margin: 0;
            font-weight: 600;
        }
        
        .table-container {
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            margin-bottom: 1rem;
            color: #2c3e50;
        }
        
        th {
            background: #f8f9fa;
            border-bottom: 2px solid #dee2e6;
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }
        
        td {
            padding: 12px;
            border-bottom: 1px solid #dee2e6;
        }
        
        tr:hover {
            background: rgba(52, 152, 219, 0.1);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            border: none;
            color: white;
        }
        
        .btn-secondary {
            background: #ecf0f1;
            border: 1px solid #bdc3c7;
            color: #2c3e50;
        }
        
        .equipment-count {
            display: inline-block;
            background: #3498db;
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.9em;
            margin-left: 10px;
        }
        
        .area-badge {
            display: inline-block;
            background: #2ecc71;
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.9em;
        }
        
        @media (max-width: 768px) {
            th, td {
                padding: 8px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Помещения фотостудии</h1>
        
        <div class="mb-4 text-center">
            <a href="/" class="btn btn-primary">
                <i class="bi bi-arrow-left"></i> Вернуться к оборудованию
            </a>
            <a href="/rooms/add" class="btn btn-success ms-2">
                <i class="bi bi-plus-circle-fill"></i> Добавить помещение
            </a>
        </div>
        
        <div class="row">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Список помещений</h5>
                    </div>
                    <div class="card-body">
                        <div th:if="${#lists.isEmpty(studioRoomList)}" class="alert alert-info">
                            Помещения не найдены. Добавьте первое помещение.
                        </div>
                        
                        <div class="table-container">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Название</th>
                                        <th>Описание</th>
                                        <th>Площадь (м²)</th>
                                        <th>Действия</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="room : ${studioRoomList}">
                                        <td th:text="${room.id}"></td>
                                        <td><strong th:text="${room.name}"></strong></td>
                                        <td th:text="${room.description != null ? room.description : '-'}"></td>
                                        <td><span class="area-badge" th:text="${room.area != null ? room.area + ' м²' : '-'}"></span></td>
                                        <td>
                                            <a th:href="@{/rooms/edit/{id}(id=${room.id})}" class="btn btn-info btn-sm">
                                                <i class="bi bi-pencil"></i> Изменить
                                            </a>
                                            <a th:href="@{/rooms/delete/{id}(id=${room.id})}" class="btn btn-danger btn-sm ms-1"
                                               onclick="return confirm('Вы уверены, что хотите удалить это помещение?')">
                                                <i class="bi bi-trash"></i> Удалить
                                            </a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
