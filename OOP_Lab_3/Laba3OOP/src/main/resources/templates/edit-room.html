<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редактирование помещения</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        body {
            padding: 20px;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, rgba(255,0,0,0.25), rgba(0,0,255,0.25), rgba(255,255,0,0.25), rgba(0,255,0,0.25));
            background-size: 400% 400%;
            animation: gradientAnimation 60s ease infinite;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            backdrop-filter: blur(10px);
            z-index: -1;
        }
        
        .container {
            max-width: 600px;
        }
        
        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
            text-align: center;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .card {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #e0e0e0;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }
        
        .card-header {
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
            border-bottom: 1px solid #e0e0e0;
            border-radius: 15px 15px 0 0 !important;
            padding: 15px 20px;
        }
        
        .card-header h5 {
            color: white;
            margin: 0;
            font-weight: 600;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            border: none;
            color: white;
        }
        
        .btn-secondary {
            background: #ecf0f1;
            border: 1px solid #bdc3c7;
            color: #2c3e50;
        }
        
        .form-label {
            color: #2c3e50;
            font-weight: 600;
        }
        
        .form-control, .form-select {
            border-radius: 8px;
            border: 1px solid #bdc3c7;
            padding: 10px 15px;
            transition: all 0.3s ease;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }
        
        .alert {
            border-radius: 10px;
            border: none;
            background: #ecf0f1;
            color: #e74c3c;
            border-left: 4px solid #e74c3c;
        }
        
        .btn-group {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Редактирование помещения</h1>
        
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Редактировать помещение фотостудии</h5>
            </div>
            <div class="card-body">
                <form method="post" action="/rooms/edit" th:object="${room}">
                    <input type="hidden" name="id" th:value="${room.id}">
                    <div th:if="${errorMessage != null}" class="alert alert-danger" th:text="${errorMessage}"></div>
                    
                    <div class="mb-3">
                        <label for="name" class="form-label">Название помещения *</label>
                        <input type="text" class="form-control" id="name" name="name" 
                               th:value="${room.name}" required
                               placeholder="Введите название помещения">
                    </div>
                    
                    <div class="mb-3">
                        <label for="description" class="form-label">Описание</label>
                        <textarea class="form-control" id="description" name="description" rows="3"
                                  th:text="${room.description}"
                                  placeholder="Описание помещения (необязательно)"></textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label for="area" class="form-label">Площадь (м²)</label>
                        <input type="number" step="0.1" class="form-control" id="area" name="area"
                               th:value="${room.area}"
                               placeholder="Площадь помещения (необязательно)">
                    </div>
                    
                    <div class="btn-group">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle-fill"></i> Сохранить
                        </button>
                        <a href="/rooms" class="btn btn-secondary">
                            <i class="bi bi-x-circle"></i> Отмена
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
